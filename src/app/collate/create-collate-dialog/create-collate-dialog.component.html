<h1 mat-dialog-title>Create New Collate</h1>
<div mat-dialog-content>
  <form [formGroup]="form" class="create-form">
    <mat-form-field>
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="Title">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="greeting" placeholder="Description"></textarea>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="close()">Cancel</button>
  <button mat-button (click)="save()" [disabled]="form.invalid">Save</button>
</div>
