<mat-card appearance="outlined">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="runSearch()" style="display: flex; gap:20px; align-items: flex-start">
      <mat-form-field style="width:500px">
        <mat-label>Search Query</mat-label>
        <textarea matInput
          formControlName="searchQuery"
          placeholder="One term per line, or separate with OR"
          rows="3"
          (keydown.enter)="onEnter($event)">
        </textarea>
        <mat-hint>One term per line · or use OR · Shift+Enter for new line</mat-hint>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Search Mode</mat-label>
        <mat-select formControlName="searchMode">
          <mat-option value="pi">Primary Ids</mat-option>
          <mat-option value="gene">Gene Names</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-icon-button type="button" matTooltip="Load curated protein list" style="margin-top:8px" (click)="openListDialog()">
        <mat-icon>list</mat-icon>
      </button>
      <button mat-icon-button color="primary" type="submit" style="margin-top:8px"><mat-icon>search</mat-icon></button>
    </form>
    @if (loading) {
      <p>Elapsed Time: {{ elapsedTime }} seconds<br>
        {{this.progress}}
      </p>
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    }
  </mat-card-content>
</mat-card>
