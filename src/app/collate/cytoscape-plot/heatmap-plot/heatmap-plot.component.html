<div class="heatmap-card">
  <mat-toolbar>
    <span class="toolbar-title">Heatmap</span>
    <span class="toolbar-spacer"></span>
    <button mat-icon-button matTooltip="Zoom in" (click)="zoomIn()">
      <mat-icon>zoom_in</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Zoom out" (click)="zoomOut()">
      <mat-icon>zoom_out</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Reset zoom" (click)="resetZoom()">
      <mat-icon>fit_screen</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Export" [matMenuTriggerFor]="exportMenu">
      <mat-icon>download</mat-icon>
    </button>
    <mat-menu #exportMenu="matMenu">
      <button mat-menu-item (click)="exportToCsv('all')">
        <mat-icon>table_chart</mat-icon> CSV — all proteins
      </button>
      <button mat-menu-item [disabled]="selectedProteinIds.size === 0" (click)="exportToCsv('selected')">
        <mat-icon>table_rows</mat-icon> CSV — selected only
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="exportImage('png')">
        <mat-icon>image</mat-icon> PNG image
      </button>
      <button mat-menu-item (click)="exportImage('svg')">
        <mat-icon>draw</mat-icon> SVG image
      </button>
    </mat-menu>
    <button mat-icon-button matTooltip="Reorder columns" (click)="reorderColumns.emit()">
      <mat-icon>reorder</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Reorder rows" (click)="reorderRows.emit()">
      <mat-icon>sort</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Toggle Legend" (click)="toggleLegend()">
      <mat-icon>{{ showLegend ? 'visibility_off' : 'help_outline' }}</mat-icon>
    </button>
  </mat-toolbar>
  @if (showLegend) {
    <div class="heatmap-legend">
      <div class="legend-title">Legend</div>
      <div class="legend-item">
        <span class="legend-color" style="border: 3px solid red;"></span>
        <span>Project boundary</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="border-bottom: 3px solid rgb(179,0,137);"></span>
        <span>Comparison group</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="border-left: 3px solid rgba(186,104,166);"></span>
        <span>Comparison separator</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="border: 3px solid #00ff00;"></span>
        <span>Selected protein</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="border: 2px solid black;"></span>
        <span>Hover highlight</span>
      </div>
      <div class="legend-item">
        <span class="legend-gradient"></span>
        <span>Log2FC (Viridis)</span>
      </div>
    </div>
  }
  <div class="heatmap-content" #plotContainer>
    <plotly-plot (hover)="handleHoverIn($event)" (unhover)="handleHoverOut($event)" (plotly_click)="onClick($event)" [data]="graphData" [layout]="layout" [config]="plotConfig" [updateOnlyWithRevision]="true" [revision]="revision"></plotly-plot>
  </div>
</div>
