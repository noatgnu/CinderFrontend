<h2 mat-dialog-title>Reorder Columns</h2>
<div mat-dialog-content class="dialog-content">
  @for (group of groups; track group.project; let gi = $index) {
    <div class="project-section">
      <div class="project-header">
        <span class="project-name">{{ group.project }}</span>
        <button mat-button (click)="reset(gi)">
          <mat-icon>refresh</mat-icon> Reset
        </button>
      </div>
      <div class="column-list"
           cdkDropList
           [cdkDropListData]="group.labels"
           (cdkDropListDropped)="drop($event, group)">
        @for (label of group.labels; track label) {
          <div class="column-item" cdkDrag>
            <mat-icon class="drag-handle">drag_handle</mat-icon>
            <span>{{ label }}</span>
          </div>
        }
      </div>
    </div>
    @if (!$last) {
      <mat-divider></mat-divider>
    }
  }
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</div>
