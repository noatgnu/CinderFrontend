<h1 mat-dialog-title>Condition Color Editor</h1>
<div mat-dialog-content>
  @for (p of projects; track p.id) {
    <div class="project-section">
      <div class="project-name">{{p.name}}</div>
      @if (projectConditionMap[p.id]) {
        @for (c of projectConditionMap[p.id]; track c) {
          <div class="condition-row">
            <ngx-colors ngx-colors-trigger [(ngModel)]="projectConditionColorMap[p.id][c]"></ngx-colors>
            <div class="condition-name">{{c}}</div>
          </div>
        }
      }
    </div>
  }
</div>
<div mat-dialog-actions>
  <button mat-button (click)="cancel()">Close</button>
  <button mat-button (click)="save()">Save</button>
</div>
