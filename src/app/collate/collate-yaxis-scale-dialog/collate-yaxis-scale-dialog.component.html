<h5 mat-dialog-title>Y Axis Scale</h5>
<div mat-dialog-content>
  <form [formGroup]="form" class="settings-form">
    <mat-radio-group formControlName="yAxisMode">
      <mat-radio-button value="auto">Automatic (per chart)</mat-radio-button>
      <mat-radio-button value="manual">Manual (same for all charts)</mat-radio-button>
    </mat-radio-group>
    @if (form.controls.yAxisMode.value === 'manual') {
      <mat-form-field>
        <mat-label>Y Axis Min</mat-label>
        <input matInput formControlName="yAxisMin" type="number">
      </mat-form-field>
      <mat-form-field>
        <mat-label>Y Axis Max</mat-label>
        <input matInput formControlName="yAxisMax" type="number">
      </mat-form-field>
    }
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="close()">Cancel</button>
  <button mat-button (click)="submit()">Apply</button>
</div>
