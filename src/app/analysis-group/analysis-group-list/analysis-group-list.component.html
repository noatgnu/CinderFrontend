@if (analysisGroupQuery) {
  <mat-selection-list [multiple]="false">
    @for (ag of analysisGroupQuery.results; track ag.id) {
      <mat-list-option [value]="ag" (click)="selectAnalysisGroup(ag)" style="height: auto; padding: 8px 0;">
        <div matListItemTitle style="font-weight: 600; line-height: 1.4; padding-bottom: 2px;">{{ag.name}}</div>
        <div matListItemLine style="opacity: 0.7; font-size: 12px; line-height: 1.2; margin-bottom: 4px;">
          {{ag.description}}
        </div>
        <div matListItemLine style="display: flex; align-items: center; gap: 8px;">
          <app-status-badge [label]="dataService.getAnalysisGroupTypeLabel(ag.analysis_group_type) || ''" type="secondary"></app-status-badge>
        </div>
      </mat-list-option>
      <mat-divider></mat-divider>
    }
  </mat-selection-list>
}
