@if (searchSessionQuery) {
  <mat-selection-list class="multiline-list" [multiple]="false">
    @for (ag of searchSessionQuery.results; track ag.id) {
      <mat-list-option [value]="ag" (click)="searchSessionSelected.emit(ag)" [disabled]="ag.failed" [matTooltip]="ag.search_term" matTooltipShowDelay="600">
        <div class="session-item">
          <div class="search-term"><b>{{ag.search_term}}</b></div>
          <small>{{ag.created_at|date: "short"}}</small>
        </div>
      </mat-list-option>
      <mat-divider></mat-divider>
    }
  </mat-selection-list>
}
